name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build web app
        run: npm run build
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Sync Capacitor
        run: npx cap sync android
      
      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug
      
      - name: Get version
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      
      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/breathing-app-v${{ steps.version.outputs.VERSION }}.apk
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: breathing-app-v${{ steps.version.outputs.VERSION }}
          path: android/app/build/outputs/apk/debug/breathing-app-v${{ steps.version.outputs.VERSION }}.apk
